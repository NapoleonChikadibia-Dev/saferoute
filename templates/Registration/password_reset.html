{% extends 'base.html' %} {% load static %} {% block content %}

<div class="auth-wrapper">
  <div class="pattern-bg"></div>

  <div class="auth-card-unified auth-card-single">

    <div class="form-section">
      <div class="auth-header">
        <div class="auth-icon"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg></div>
        <h2>Reset Password</h2>
        <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>
      </div>

      <form method="POST" class="auth-form" id="reset-form" novalidate>
        {% csrf_token %}

        <div class="input-group" id="group-email">
          <div class="input-icon"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
          <div class="input-field">
            <input type="email" name="email" id="email" required
                   placeholder=" " autocomplete="email"/>
            <label for="email">Email Address</label>
            <div class="input-line"></div>
          </div>
          <span class="field-status" id="status-email"></span>
        </div>
        <div class="field-feedback" id="feedback-email"></div>

        <button type="submit" class="auth-btn">
          <span class="btn-text">Send Reset Link</span>
          <span class="btn-icon">→</span>
        </button>

        <div class="auth-divider"><span>Remembered your password?</span></div>
        <a href="{% url 'login' %}" class="auth-secondary-btn">Back to Login</a>
      </form>
    </div>

  </div>
</div>

<style>
  .auth-wrapper {
    min-height: calc(100vh - 68px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
  }
  .pattern-bg {
    position: fixed;
    inset: 0;
    background-color: var(--bg);
    background-image:
      radial-gradient(circle at 20% 40%, rgba(230,57,70,0.08) 0%, transparent 50%),
      repeating-linear-gradient(0deg, rgba(59,130,246,0.04) 0px, rgba(59,130,246,0.04) 1px, transparent 1px, transparent 40px),
      repeating-linear-gradient(90deg, rgba(59,130,246,0.04) 0px, rgba(59,130,246,0.04) 1px, transparent 1px, transparent 40px);
    pointer-events: none;
    z-index: 0;
  }

  /* Single column card — no radar */
  .auth-card-single {
    max-width: 480px !important;
    flex-direction: column !important;
  }
  .auth-card-single .form-section {
    padding: 48px 44px;
  }

  .auth-card-unified {
    display: flex;
    width: 100%;
    background: rgba(15,17,32,0.95);
    backdrop-filter: blur(20px);
    border-radius: 32px;
    border: 1px solid rgba(230,57,70,0.3);
    overflow: hidden;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    position: relative;
    z-index: 1;
    transition: transform 0.3s ease, border-color 0.3s ease;
  }
  .auth-card-unified:hover {
    transform: translateY(-4px);
    border-color: rgba(230,57,70,0.5);
  }

  .input-field { position: relative; }
  .field-status { font-size: 15px; min-width: 20px; text-align: center; }
  .field-feedback { font-size: 11px; padding: 2px 4px 4px; min-height: 16px; }
  .field-feedback.error   { color: #e63946; }
  .field-feedback.success { color: #2ecc71; }
  .input-group.valid .input-line   { background: #2ecc71 !important; width: 100% !important; }
  .input-group.invalid .input-line { background: #e63946 !important; width: 100% !important; }

  @media (max-width: 520px) {
    .auth-wrapper { padding: 20px 12px; }
    .auth-card-single .form-section { padding: 36px 24px 44px; }
    .auth-card-unified { border-radius: 20px; }
  }
  @media (max-width: 380px) {
    .auth-wrapper { padding: 0; min-height: 100dvh; align-items: flex-start; }
    .auth-card-unified { border-radius: 0; min-height: 100dvh; box-shadow: none; border-left: none; border-right: none; border-top: none; }
    .auth-card-single .form-section { padding: 40px 20px 48px; }
  }
</style>

<script>
  const emailInput = document.getElementById('email');
  emailInput.addEventListener('input', function () {
    const val = this.value.trim();
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
    if (!val) {
      clearField(); return;
    }
    if (!emailRegex.test(val)) {
      setInvalid('Enter a valid email address (e.g. name@gmail.com)');
    } else {
      setValid('✓ Valid email');
    }
  });

  document.getElementById('reset-form').addEventListener('submit', function (e) {
    const val = document.getElementById('email').value.trim();
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
    if (!emailRegex.test(val)) {
      e.preventDefault();
      setInvalid('Enter a valid email address');
    }
  });

  function setValid(msg) {
    document.getElementById('group-email').classList.replace('invalid','valid');
    const f = document.getElementById('feedback-email');
    f.textContent = msg; f.className = 'field-feedback success';
    document.getElementById('status-email').textContent = '✅';
  }
  function setInvalid(msg) {
    document.getElementById('group-email').classList.replace('valid','invalid');
    const f = document.getElementById('feedback-email');
    f.textContent = msg; f.className = 'field-feedback error';
    document.getElementById('status-email').textContent = '❌';
  }
  function clearField() {
    document.getElementById('group-email').classList.remove('valid','invalid');
    document.getElementById('feedback-email').textContent = '';
    document.getElementById('feedback-email').className = 'field-feedback';
    document.getElementById('status-email').textContent = '';
  }

  document.querySelectorAll('.input-field input').forEach(input => {
    input.addEventListener('focus', function () {
      this.parentElement.querySelector('.input-line').style.width = '100%';
    });
  });
</script>

{% endblock %}
